name: Build and Test
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install nasm (Linux)
        uses: ilammy/setup-nasm@v1

      - name: Build Libraries
        run: |
          zig build ci -Doptimize=ReleaseFast --summary all --verbose

      - name: Upload aarch64-linux
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-linux
          path: zig-out/aarch64-linux/

      - name: Upload aarch64-macos
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-macos
          path: zig-out/aarch64-macos/

      - name: Upload aarch64-windows
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-windows
          path: zig-out/aarch64-windows/

      - name: Upload riscv32-linux
        uses: actions/upload-artifact@v4
        with:
          name: riscv32-linux
          path: zig-out/riscv32-linux/

      - name: Upload riscv64-linux
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-linux
          path: zig-out/riscv64-linux/

      - name: Upload x86_64-linux
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-linux
          path: zig-out/x86_64-linux/

      - name: Upload x86_64-macos
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-macos
          path: zig-out/x86_64-macos/

      - name: Upload x86_64-windows
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-windows
          path: zig-out/x86_64-windows/

  test:
    name: Run Tests (all configs on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: windows-latest
            arch: x86_64
          - os: macos-latest
            arch: aarch64
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install nasm
        if: ${{ matrix.arch == 'x86_64' }}
        uses: ilammy/setup-nasm@v1

      - name: Run tests (All enabled)
        run: |
          zig build test --summary all --verbose

      - name: Run tests (Only spng)
        run: |
          zig build test -Dspng=true -Djpeg_turbo=false -Dtiff=false -Dwebp=false --summary all --verbose

      - name: Run tests (Only jpeg-turbo)
        run: |
          zig build test -Dspng=false -Djpeg_turbo=true -Dtiff=false -Dwebp=false --summary all --verbose

      - name: Run tests (Only tiff)
        run: |
          zig build test -Dspng=false -Djpeg_turbo=false -Dtiff=true -Dwebp=false --summary all --verbose

      - name: Run tests (Only webp)
        run: |
          zig build test -Dspng=false -Djpeg_turbo=false -Dtiff=false -Dwebp=true --summary all --verbose

  publish:
    # if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: false
      - run: |
          ls -R

      # - name: Create Release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     draft: false
      #     prerelease: false
      #     files: artifacts/*

